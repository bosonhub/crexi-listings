name: Scrape Crexi Listings

on:
  schedule:
    # Runs every day at 6:00 AM UTC (11 PM PT / 2 AM ET)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Also allows manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx patchwright install chromium --with-deps

      - name: Run scraper
        run: node scripts/scrape.js

      - name: Commit and push updated listings (only if scraper found results)
        run: |
          if [ -f .scraper_updated ]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add listings.json
            git diff --staged --quiet || git commit -m "chore: update listings [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
            rm -f .scraper_updated
            echo "Listings committed and pushed."
          else
            echo "Scraper found no listings - skipping commit to preserve existing data."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
